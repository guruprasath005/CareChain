<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default:"Action Confirmed" }} - Carechain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-full p-4">
    <div class="text-center p-8 bg-white rounded-xl shadow-lg max-w-md w-full">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
            <!-- Green Checkmark Icon -->
            <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ title|default:"Success!" }}</h1>
        <p class="text-gray-600 mb-8">{{ message|default:"Your action was completed successfully." }}</p>
        
        <!-- This block will only render if a button_url is provided from the Django view -->
        {% if button_url %}
        <div class="mt-6">
            <a href="{{ button_url }}" target="_blank" class="inline-block px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75">
                {{ button_text|default:"Continue" }}
            </a>
        </div>
        {% endif %}

        
        <div class="mt-8">
            <a href="tg://resolve" class="text-sm text-blue-600 hover:underline">
                Return to Telegram
            </a>
        </div>
    </div>
</body>
</html>
